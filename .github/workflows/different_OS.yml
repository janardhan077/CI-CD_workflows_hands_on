name: GitHub Hosted Runners Demo

on:
  push:

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print system info (Ubuntu)
        run: |
          echo "OS: Ubuntu"
          echo "Hostname:"
          hostname
          echo "Current User:"
          whoami

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print system info (Windows)
        run: |
          echo OS: Windows
          echo Hostname:
          hostname
          echo Current User:
          whoami

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print system info (macOS)
        run: |
          echo "OS: macOS"
          echo "Hostname:"
          hostname
          echo "Current User:"
          whoami  
  
