name: CICD
on :
  workflow_dispatch:

jobs:
       
  code:
      runs-on: Ubuntu-latest
      steps: 
        - name: code checkout
          run: echo " code clone from github"
  build:
      needs: [code]
      runs-on: Ubuntu-latest
      steps:
      - name: build images 
        run : echo " the images is built "
  test:
      needs: [build]
